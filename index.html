<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ほぱにきリュウの状況別コンボ</title>
    <!-- PWA用メタタグ -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a202c">
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* カスタムスクロールバー（横スクロール用） */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* スムーズなフェードインアニメーション */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* 選択されたカテゴリーボタンのスタイル */
        .active-category {
            background-color: #ef4444; /* Tailwind red-500 */
            color: white;
            border-color: #ef4444;
        }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-100 font-sans min-h-screen flex flex-col">

    <!-- ヘッダー -->
    <header class="bg-neutral-900 p-4 shadow-lg border-b border-red-800 sticky top-0 z-10">
        <h1 class="text-2xl font-black text-center text-white mb-3 tracking-wider">
            <span class="text-red-600">🥋</span> ほぱにきリュウの状況別コンボ
        </h1>
        
        <!-- 検索バー -->
        <div class="mb-3">
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-neutral-500">🔍</span>
                <input type="text" id="search-input" placeholder="技名や状況で検索 (例: 昇竜拳)" 
                    class="w-full bg-neutral-800 text-white pl-10 pr-4 py-2 rounded-lg border border-neutral-700 focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition-colors">
            </div>
        </div>

        <!-- カテゴリーボタン（横スクロール） -->
        <nav id="category-nav" class="flex overflow-x-auto hide-scrollbar gap-2 pb-1">
            <!-- JavaScriptでボタンがここに生成されます -->
        </nav>
    </header>

    <!-- コンテンツエリア -->
    <main class="flex-grow p-4">
        <div id="combo-container" class="space-y-4 max-w-2xl mx-auto">
            <!-- JavaScriptでコンボカードがここに生成されます -->
            <div class="text-center text-neutral-500 mt-10">
                <p>上のカテゴリーを選択してください</p>
            </div>
        </div>
    </main>

    <!-- フッター -->
    <footer class="bg-neutral-900 p-4 border-t border-neutral-800 text-center text-xs text-neutral-500 mt-auto">
        <p>Hopaniki Ryu Combo Reference / ホーム画面に追加してアプリとして使用可能</p>
    </footer>

    <script>
        // 提供されたJSONデータ
        const comboData = [
            { "category": "基本の立ち回り始動", "situation": "小技確認（発生の早い下段などから）", "combo": "2弱K → 5弱P → 5弱P → 強昇竜拳", "notes": "ダメージ重視" },
            { "category": "基本の立ち回り始動", "situation": "小技確認（発生の早い下段などから）", "combo": "2弱K → 5弱P → 5弱P → 弱竜巻旋風脚", "notes": "運び重視" },
            { "category": "基本の立ち回り始動", "situation": "中攻撃始動（有利フレームや確反から）", "combo": "5中P → 2中P → OD足刀 → 6強K → 弱竜巻旋風脚", "notes": "基本ルート" },
            { "category": "基本の立ち回り始動", "situation": "中攻撃始動（有利フレームや確反から）", "combo": "5中P → 5弱K → 中竜巻旋風脚", "notes": "妥協・距離遠 (2中Pが届かない時) ※難しい" },
            { "category": "基本の立ち回り始動", "situation": "中攻撃始動（有利フレームや確反から）", "combo": "5中P → 4強P → 強昇竜拳", "notes": "密着ダメージ" },
            { "category": "基本の立ち回り始動", "situation": "中攻撃始動（有利フレームや確反から）", "combo": "5中P → 4強P → 強足刀", "notes": "密着起き攻め" },
            { "category": "基本の立ち回り始動", "situation": "大ゴス（6強P）始動", "combo": "6強P → 2中P → OD足刀 → 6強K → 弱竜巻旋風脚", "notes": "" },
            { "category": "崩し・強化状態からの始動", "situation": "ラッシュ中段（鎖骨割り）始動", "combo": "[ラッシュ] 6中P → 2中P → OD足刀 → 6強K → 弱竜巻旋風脚", "notes": "ノーゲージ" },
            { "category": "崩し・強化状態からの始動", "situation": "ラッシュ中段（鎖骨割り）始動", "combo": "[ラッシュ] 6中P → 2中P → [ラッシュ] 5強K → 5強P → [ラッシュ] 5強K → 5強P → 強昇竜拳 → SA3", "notes": "ゲージ放出" },
            { "category": "崩し・強化状態からの始動", "situation": "集中状態（電刃練気）コンボ", "combo": "中技以上 → (強化)強波掌撃 → 中竜巻旋風脚", "notes": "運び重視" },
            { "category": "崩し・強化状態からの始動", "situation": "集中状態（電刃練気）コンボ", "combo": "中技以上 → (強化)強波掌撃 → [ラッシュ] 4強P → 強昇竜拳", "notes": "ダメージ重視" },
            { "category": "ドライブラッシュ始動", "situation": "下段（2中K）からのラッシュ", "combo": "2中K → [ラッシュ] 5強P → 4強P → 強昇竜拳", "notes": "基本形" },
            { "category": "ドライブラッシュ始動", "situation": "下段（2中K）からのラッシュ", "combo": "2中K → [ラッシュ] 2強P → 強波掌撃 → 中竜巻旋風脚", "notes": "運び形" },
            { "category": "ドライブラッシュ始動", "situation": "強攻撃からのラッシュ", "combo": "5強P → [ラッシュ] 5強K → 2強P → 強昇竜拳", "notes": "基本形" },
            { "category": "ドライブラッシュ始動", "situation": "強攻撃からのラッシュ", "combo": "5強P → [ラッシュ] 5強K → 2強P → [ラッシュ] 5強K → 5強K → SA1", "notes": "SA1締め" },
            { "category": "ドライブラッシュ始動", "situation": "強攻撃からのラッシュ", "combo": "5強P → [ラッシュ] 5強K → 2強P → [ラッシュ] 5強K → 2強P → SA2", "notes": "SA2締め" },
            { "category": "ドライブラッシュ始動", "situation": "強攻撃からのラッシュ", "combo": "5強P → [ラッシュ] 5強K → 2強P → [ラッシュ] 5強K → 2強P → 強昇竜拳 → SA3", "notes": "延長SA3" },
            { "category": "ドライブラッシュ始動", "situation": "中技以上からの高火力ラッシュ", "combo": "中技以上 → [ラッシュ] 5強P → 4強P → [ラッシュ] 5強K → 5強P → 強昇竜拳 → SA3", "notes": "" },
            { "category": "画面端限定コンボ", "situation": "OD竜巻（壁バウンド）絡み", "combo": "各種始動 → OD竜巻旋風脚 → 強昇竜拳", "notes": "基本形" },
            { "category": "画面端限定コンボ", "situation": "OD竜巻（壁バウンド）絡み", "combo": "各種始動 → OD竜巻旋風脚 → [ラッシュ] 2中P → [ラッシュ] 2強P → 強足刀 → SA1", "notes": "SA1締め" },
            { "category": "画面端限定コンボ", "situation": "OD竜巻（壁バウンド）絡み", "combo": "各種始動 → OD竜巻旋風脚 → [ラッシュ] 2中P → [ラッシュ] 2強P → 強足刀 → 強昇竜拳 → SA3", "notes": "SA3締め" },
            { "category": "画面端限定コンボ", "situation": "その他 画面端ルート", "combo": "2中K → [ラッシュ] 5強P → 4強P → 強足刀 → 中昇竜拳", "notes": "下段始動" },
            { "category": "画面端限定コンボ", "situation": "その他 画面端ルート", "combo": "2中K → [ラッシュ] 5強P → 4強P → [ラッシュ] 5強P → 4強P → 強足刀 → 中昇竜拳 → SA3", "notes": "下段SA3" },
            { "category": "画面端限定コンボ", "situation": "その他 画面端ルート", "combo": "各種始動 → 強波掌撃 → [ラッシュ] 5強P・5強K → 強昇竜拳", "notes": "波掌撃コン" },
            { "category": "特定の確定反撃・お仕置き状況", "situation": "無敵技ガード後（パニッシュカウンター）", "combo": "5強K(パニカン) → 5強P → 強昇竜拳", "notes": "ノーゲージ" },
            { "category": "特定の確定反撃・お仕置き状況", "situation": "無敵技ガード後（パニッシュカウンター）", "combo": "5強K(パニカン) → 前ステ → 2強P → 中竜巻旋風脚", "notes": "運び・起き攻め" },
            { "category": "特定の確定反撃・お仕置き状況", "situation": "無敵技ガード後（パニッシュカウンター）", "combo": "5強K(パニカン) → 5強P → [ラッシュ] 5強K → 2強P → [ラッシュ] 5強K → 2強P → 強昇竜拳 → SA3", "notes": "SA3締め" },
            { "category": "特定の確定反撃・お仕置き状況", "situation": "無敵技ガード後（パニッシュカウンター）", "combo": "OD波掌撃(パニカン) → 2中P → [ラッシュ] 5強K → 2強P → [ラッシュ] 5強K → 2強P → 強昇竜拳 → SA3", "notes": "OD波掌撃始動" },
            { "category": "特定の確定反撃・お仕置き状況", "situation": "シミー成功時（投げ抜け狩り）", "combo": "2強P(パニカン) → 強波掌撃 → 中竜巻旋風脚", "notes": "運び重視" },
            { "category": "特定の確定反撃・お仕置き状況", "situation": "シミー成功時（投げ抜け狩り）", "combo": "2強P(パニカン) → 強波掌撃 → [ラッシュ] 4強P → 強昇竜拳", "notes": "ダメージ" },
            { "category": "特定の確定反撃・お仕置き状況", "situation": "シミー成功時（投げ抜け狩り）", "combo": "2強P(パニカン) → 強波掌撃 → 6強K → OD竜巻旋風脚 → SA1", "notes": "SA1締め（画面端）" },
            { "category": "特定の確定反撃・お仕置き状況", "situation": "シミー成功時（投げ抜け狩り）", "combo": "2強P(パニカン) → 強波掌撃 → 6強K → OD竜巻旋風脚 → SA3", "notes": "SA3締め（画面端）" },
            { "category": "特定の確定反撃・お仕置き状況", "situation": "Dリバーサル ガード時", "combo": "5中P(パニカン) → 5強P → 強昇竜拳", "notes": "" },
            { "category": "システム反撃・特殊状況", "situation": "ドライブインパクト絡み", "combo": "インパクト(パニカン) → 6強P → 2中P → OD足刀 → 6強K → 竜巻旋風脚", "notes": "インパクト返し（中央）" },
            { "category": "システム反撃・特殊状況", "situation": "ドライブインパクト絡み", "combo": "インパクト(パニカン) → 6強P → 2中P → [ラッシュ] 5強K → 2強P → 強昇竜拳 → SA3", "notes": "インパクト返しSA3" },
            { "category": "システム反撃・特殊状況", "situation": "ドライブインパクト絡み", "combo": "インパクト(壁) → 5強P・5強K → 強昇竜拳", "notes": "壁ドン時" },
            { "category": "システム反撃・特殊状況", "situation": "ジャストパリィ成立時", "combo": "4強P(パニカン) → 強波掌撃 → 中竜巻旋風脚", "notes": "" },
            { "category": "システム反撃・特殊状況", "situation": "ジャストパリィ成立時", "combo": "5中P(パニカン) → 5強P → 強昇竜拳", "notes": "" },
            { "category": "システム反撃・特殊状況", "situation": "位置入れ替えルート（端から脱出）", "combo": "インパクト(パニカン) → バクステ → 5強P → OD足刀 → 前ステ → 弱昇竜拳", "notes": "インパクト時" },
            { "category": "システム反撃・特殊状況", "situation": "位置入れ替えルート（端から脱出）", "combo": "5強K(パニカン) → バクステ → 5強P → OD足刀 → 前ステ → 弱昇竜拳", "notes": "無敵技ガード時（使用頻度低そう）" },
            { "category": "システム反撃・特殊状況", "situation": "スタン時（壁際）", "combo": "集中 → ジャンプ強P → 2強P → 強波掌撃 → [ラッシュ] 5強P・5強K → 強昇竜拳 → SA3", "notes": "SA3最大" },
            { "category": "システム反撃・特殊状況", "situation": "スタン時（壁際）", "combo": "集中 → SA2(最大溜め) → 6強K → 竜巻旋風脚", "notes": "SA2最大" },
            { "category": "起き攻め・セットプレイ", "situation": "強昇竜拳 締め後", "combo": "[ラッシュ] 5中P", "notes": "打撃重ね" },
            { "category": "起き攻め・セットプレイ", "situation": "強昇竜拳 締め後", "combo": "[ラッシュ] 投げ", "notes": "投げ重ね" },
            { "category": "起き攻め・セットプレイ", "situation": "強昇竜拳 締め後", "combo": "[ラッシュ] 様子見", "notes": "警戒・シミー (相手の無敵技などを警戒)" },
            { "category": "起き攻め・セットプレイ", "situation": "強波掌撃 → 中竜巻旋風脚 締め後", "combo": "前ステ → 5中P", "notes": "打撃重ね" },
            { "category": "起き攻め・セットプレイ", "situation": "強波掌撃 → 中竜巻旋風脚 締め後", "combo": "前ステ → 微歩き → 投げ", "notes": "投げ重ね" },
            { "category": "起き攻め・セットプレイ", "situation": "強波掌撃 → 中竜巻旋風脚 締め後", "combo": "前ステ → 微歩き → 様子見", "notes": "警戒・シミー" },
            { "category": "起き攻め・セットプレイ", "situation": "OD足刀 → 6強P → 竜巻旋風脚 締め後", "combo": "前ステ → 前ステ → 5中P", "notes": "打撃重ね" },
            { "category": "起き攻め・セットプレイ", "situation": "OD足刀 → 6強P → 竜巻旋風脚 締め後", "combo": "前ステ → 前ステ → 微歩き → 投げ", "notes": "投げ重ね" },
            { "category": "起き攻め・セットプレイ", "situation": "OD足刀 → 6強P → 竜巻旋風脚 締め後", "combo": "前ステ → 前ステ → 様子見", "notes": "警戒・シミー" },
            { "category": "起き攻め・セットプレイ", "situation": "画面端の投げ後（フレーム消費）", "combo": "5弱P(空振り) → 投げ", "notes": "投げ重ね" },
            { "category": "起き攻め・セットプレイ", "situation": "画面端の投げ後（フレーム消費）", "combo": "5弱P(空振り) → 5中P", "notes": "打撃重ね" },
            { "category": "起き攻め・セットプレイ", "situation": "画面端の強足刀 → 中昇竜拳 締め後（フレーム消費）", "combo": "2中P(空振り)", "notes": "有利状況作成 → (有利を作って打撃や投げへ)" },
            { "category": "起き攻め・セットプレイ", "situation": "画面端のOD竜巻旋風脚 → 強昇竜拳 締め後（フレーム消費）", "combo": "5強K(空振り) → 5中P", "notes": "打撃重ね" },
            { "category": "起き攻め・セットプレイ", "situation": "画面端のOD竜巻旋風脚 → 強昇竜拳 締め後（フレーム消費）", "combo": "5強K(空振り) → 投げ", "notes": "投げ重ね" }
        ];

        // 各コンボに一意のIDを付与
        comboData.forEach((item, index) => {
            item.id = 'combo_' + index;
        });

        // カテゴリーの重複をなくして配列にする
        const categories = [...new Set(comboData.map(item => item.category))];
        
        const navContainer = document.getElementById('category-nav');
        const comboContainer = document.getElementById('combo-container');
        const searchInput = document.getElementById('search-input');

        // 状態管理
        let currentCategory = categories[0];
        let currentSearchQuery = '';
        let favorites = JSON.parse(localStorage.getItem('ryuFavorites')) || [];

        // お気に入りの切り替え
        function toggleFavorite(id) {
            if (favorites.includes(id)) {
                favorites = favorites.filter(favId => favId !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('ryuFavorites', JSON.stringify(favorites));
            displayCombos(); // 再描画
        }

        // イベント委譲でお気に入りボタンのクリックを処理
        comboContainer.addEventListener('click', (e) => {
            const btn = e.target.closest('.fav-btn');
            if (btn) {
                toggleFavorite(btn.dataset.id);
            }
        });

        // 検索機能のイベント
        searchInput.addEventListener('input', (e) => {
            currentSearchQuery = e.target.value;
            if (currentSearchQuery) {
                document.querySelectorAll('#category-nav button').forEach(b => b.classList.remove('active-category', 'bg-red-600', 'border-red-600', 'text-white'));
            } else {
                updateCategoryButtons();
            }
            displayCombos();
        });

        // カテゴリーボタンの見た目を更新
        function updateCategoryButtons() {
            document.querySelectorAll('#category-nav button').forEach(b => {
                if (b.textContent === currentCategory && !currentSearchQuery) {
                    b.classList.add('active-category', 'bg-red-600', 'border-red-600', 'text-white');
                    b.classList.remove('bg-neutral-800', 'text-neutral-300');
                } else {
                    b.classList.remove('active-category', 'bg-red-600', 'border-red-600', 'text-white');
                    b.classList.add('bg-neutral-800', 'text-neutral-300');
                }
            });
        }

        // カテゴリーボタンを生成
        function renderCategories() {
            // お気に入り専用ボタンを追加
            const favBtn = document.createElement('button');
            favBtn.className = 'whitespace-nowrap px-4 py-2 rounded-full bg-neutral-800 border border-neutral-700 text-sm font-medium transition-colors hover:bg-neutral-700 text-neutral-300 focus:outline-none';
            favBtn.textContent = '⭐ お気に入り';
            
            favBtn.addEventListener('click', () => {
                currentCategory = '⭐ お気に入り';
                currentSearchQuery = '';
                searchInput.value = ''; // 検索バーをクリア
                updateCategoryButtons();
                displayCombos();
            });
            
            navContainer.appendChild(favBtn);

            // 通常のカテゴリーボタン
            categories.forEach((cat) => {
                const btn = document.createElement('button');
                btn.className = 'whitespace-nowrap px-4 py-2 rounded-full bg-neutral-800 border border-neutral-700 text-sm font-medium transition-colors hover:bg-neutral-700 text-neutral-300 focus:outline-none';
                btn.textContent = cat;
                
                btn.addEventListener('click', () => {
                    currentCategory = cat;
                    currentSearchQuery = '';
                    searchInput.value = ''; // 検索バーをクリア
                    updateCategoryButtons();
                    displayCombos();
                });
                
                navContainer.appendChild(btn);
            });
        }

        // コンボの表示ロジック
        function displayCombos() {
            comboContainer.innerHTML = ''; // クリア
            
            let targetCombos = [];
            
            // 検索 or カテゴリーでフィルタリング
            if (currentSearchQuery) {
                const q = currentSearchQuery.toLowerCase();
                // 検索文字列が含まれるかチェック
                targetCombos = comboData.filter(item => 
                    item.combo.toLowerCase().includes(q) || 
                    item.situation.toLowerCase().includes(q) || 
                    (item.notes && item.notes.toLowerCase().includes(q))
                );
            } else if (currentCategory === '⭐ お気に入り') {
                // お気に入りのみの抽出
                targetCombos = comboData.filter(item => favorites.includes(item.id));
            } else {
                targetCombos = comboData.filter(item => item.category === currentCategory);
            }

            if (targetCombos.length === 0) {
                if (currentCategory === '⭐ お気に入り' && !currentSearchQuery) {
                    comboContainer.innerHTML = '<div class="text-center text-neutral-500 mt-10"><p>お気に入りに登録されたコンボはありません。<br>各コンボの右上の☆をタップして登録してください。</p></div>';
                } else {
                    comboContainer.innerHTML = '<div class="text-center text-neutral-500 mt-10"><p>見つかりませんでした</p></div>';
                }
                return;
            }

            // お気に入りとその他に分割
            const favCombos = targetCombos.filter(item => favorites.includes(item.id));
            const otherCombos = targetCombos.filter(item => !favorites.includes(item.id));

            let delay = 0;

            // 1. お気に入り（ピン留め）の表示
            if (favCombos.length > 0) {
                if (currentCategory !== '⭐ お気に入り' || currentSearchQuery) {
                    const favHeader = document.createElement('h2');
                    favHeader.className = 'text-xl font-black text-yellow-400 mt-6 mb-3 border-b-2 border-yellow-500 pb-1 fade-in tracking-wider';
                    favHeader.innerHTML = '⭐ お気に入り (ピン留め)';
                    comboContainer.appendChild(favHeader);
                    
                    favCombos.forEach(item => {
                        comboContainer.appendChild(createComboCard(item, delay, true));
                        delay += 50;
                    });
                } else {
                    // 「⭐ お気に入り」カテゴリーを見ている時は、状況ごとにグループ化して綺麗に表示
                    const groupedFavs = favCombos.reduce((acc, curr) => {
                        if (!acc[curr.situation]) acc[curr.situation] = [];
                        acc[curr.situation].push(curr);
                        return acc;
                    }, {});
                    
                    for (const [situation, combos] of Object.entries(groupedFavs)) {
                        const header = document.createElement('h2');
                        header.className = 'text-lg font-bold text-yellow-500 mt-8 mb-3 border-b border-neutral-700 pb-1 fade-in tracking-wide';
                        header.style.animationDelay = `${delay}ms`;
                        header.textContent = `🎯 ${situation}`;
                        comboContainer.appendChild(header);
                        delay += 50;

                        combos.forEach(item => {
                            comboContainer.appendChild(createComboCard(item, delay, true));
                            delay += 50;
                        });
                    }
                }
            }

            // 2. その他のコンボ表示 (状況ごとにグループ化)
            const groupedBySituation = otherCombos.reduce((acc, curr) => {
                if (!acc[curr.situation]) acc[curr.situation] = [];
                acc[curr.situation].push(curr);
                return acc;
            }, {});
            
            for (const [situation, combos] of Object.entries(groupedBySituation)) {
                const header = document.createElement('h2');
                header.className = 'text-lg font-bold text-red-500 mt-8 mb-3 border-b border-neutral-700 pb-1 fade-in tracking-wide';
                header.style.animationDelay = `${delay}ms`;
                header.textContent = `🎯 ${situation}`;
                comboContainer.appendChild(header);
                delay += 50;

                combos.forEach(item => {
                    comboContainer.appendChild(createComboCard(item, delay, false));
                    delay += 50;
                });
            }
        }

        // カード生成関数
        function createComboCard(item, delay, isFav) {
            const card = document.createElement('div');
            // 黒・白・赤のリュウテーマを強調
            card.className = `bg-neutral-900 rounded-lg p-4 mb-3 border-l-4 shadow-lg relative fade-in ${isFav ? 'border-yellow-400' : 'border-red-600'}`;
            card.style.animationDelay = `${delay}ms`;
            
            // 装飾 (SAの文字色も赤に変更)
            let formattedCombo = item.combo
                .replace(/\[ラッシュ\]/g, '<span class="text-green-400 font-bold">[ラッシュ]</span>')
                .replace(/\(パニカン\)/g, '<span class="text-yellow-400 font-bold">(パニカン)</span>')
                .replace(/SA[1-3]/g, match => `<span class="text-red-400 font-bold">${match}</span>`);

            let notesHtml = item.notes ? `<div class="mt-2 text-sm text-neutral-400 flex items-center font-medium"><span class="mr-1 text-red-600">▶</span> ${item.notes}</div>` : '';

            // 検索時は状況(situation)もカード内に表示するとわかりやすい
            let situationHtml = currentSearchQuery && !isFav ? `<div class="text-xs text-red-500 mb-1 font-bold">${item.situation}</div>` : '';

            card.innerHTML = `
                <button class="fav-btn absolute top-3 right-3 text-2xl focus:outline-none transition-transform hover:scale-110 drop-shadow-md z-10" data-id="${item.id}" aria-label="お気に入り登録">
                    ${isFav ? '⭐' : '<span class="text-neutral-600">☆</span>'}
                </button>
                <div class="pr-8">
                    ${situationHtml}
                    <div class="font-mono text-lg font-medium leading-relaxed tracking-wide text-white">${formattedCombo}</div>
                    ${notesHtml}
                </div>
            `;
            return card;
        }

        // 初期化
        renderCategories();
        updateCategoryButtons();
        displayCombos();

    </script>
</body>
</html>
